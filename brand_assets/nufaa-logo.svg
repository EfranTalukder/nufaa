<svg width="800" height="600" viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Left Green Gradient (Dark bottom-left to Bright top-right) -->
    <linearGradient id="greenLeft" x1="210" y1="470" x2="350" y2="150" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E753B"/>
      <stop offset="50%" stop-color="#4AB04E"/>
      <stop offset="100%" stop-color="#8BC53F"/>
    </linearGradient>
    
    <!-- Right Green Gradient (Dark top-right to Bright bottom-left) -->
    <linearGradient id="greenRight" x1="530" y1="150" x2="390" y2="470" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E753B"/>
      <stop offset="50%" stop-color="#4AB04E"/>
      <stop offset="100%" stop-color="#8BC53F"/>
    </linearGradient>

    <!-- Blue Diagonal Gradient (Dark top-left to Light bottom-right) -->
    <linearGradient id="blueDiag" x1="270" y1="230" x2="470" y2="390" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#112340"/>
      <stop offset="100%" stop-color="#2A5082"/>
    </linearGradient>

    <!-- Star Gradient -->
    <linearGradient id="starGrad" x1="540" y1="210" x2="620" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4AB04E"/>
      <stop offset="100%" stop-color="#8BC53F"/>
    </linearGradient>
  </defs>

  <!-- Blue Diagonal (Drawn First so it goes under folds) -->
  <path d="M 270 230 L 350 150 L 470 390 L 390 470 Z" fill="url(#blueDiag)"/>

  <!-- Left Green Stem -->
  <path d="M 270 470 
           A 60 60 0 0 1 210 410 
           L 210 210 
           A 60 60 0 0 1 270 150 
           L 350 150 
           L 270 230 
           L 270 470 Z" fill="url(#greenLeft)"/>

  <!-- Right Green Stem -->
  <path d="M 470 150 
           A 60 60 0 0 1 530 210 
           L 530 410 
           A 60 60 0 0 1 470 470 
           L 390 470 
           L 470 390 
           L 470 150 Z" fill="url(#greenRight)"/>

  <!-- Four-Pointed Star -->
  <path d="M 580 110 
           Q 580 160 530 160 
           Q 580 160 580 210 
           Q 580 160 630 160 
           Q 580 160 580 110 Z" fill="url(#starGrad)"/>
</svg>
